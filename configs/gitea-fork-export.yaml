  - services/kcp/**
  - routers/web/repo/kcp.go
  - routers/api/v1/kcp/**
  - migrations/**
  - openapi/**
  - templates/repo/kcp/**
  - web_src/js/features/kcp-*.js
  - web_src/css/features/kcp-*.css
forbidden_targets:
  - kyba-context-capsules
  - kyba-contracts
  - kyba-infra
